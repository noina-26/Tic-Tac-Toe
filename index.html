<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-wrapper">
    <h1 class="title">Tic Tac Toe</h1>

    <div class="status-bar">
      <span id="statusText">Player X's turn</span>
    </div>

    <div class="board" id="board">
      <!-- 9 cells -->
      <button class="cell" data-index="0"></button>
      <button class="cell" data-index="1"></button>
      <button class="cell" data-index="2"></button>
      <button class="cell" data-index="3"></button>
      <button class="cell" data-index="4"></button>
      <button class="cell" data-index="5"></button>
      <button class="cell" data-index="6"></button>
      <button class="cell" data-index="7"></button>
      <button class="cell" data-index="8"></button>
    </div>

    <div class="controls">
      <button id="resetBtn">Restart Game</button>
    </div>

    <div class="scoreboard">
      <div>Player X: <span id="scoreX">0</span></div>
      <div>Player O: <span id="scoreO">0</span></div>
      <div>Draws: <span id="scoreDraw">0</span></div>
    </div>
  </div>

  <!-- Result Overlay Screen -->
  <div class="overlay" id="resultOverlay">
    <div class="overlay-content">
      <h2 id="resultMessage">Player X wins!</h2>
      <button id="newGameBtn">New Game</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
